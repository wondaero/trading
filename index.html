<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Flow - 실시간 주식 정보 대시보드</title>
  <meta name="description" content="한국투자증권 API 및 Supabase 기반 실시간 주식 가격 및 장중 최고/최저가 시각적 모니터링 대시보드">
  <!-- Google Fonts Outfit & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Application Header -->
    <header class="app-header">
      <div class="brand-section">
        <div class="brand-logo">
          <i data-lucide="trending-up"></i>
        </div>
        <h1 class="brand-title">Stock Flow</h1>
      </div>

      <!-- Navigation Tabs -->
      <nav class="nav-tabs">
        <button class="tab-btn active" data-tab="dashboard">
          <i data-lucide="layout-dashboard"></i>메인
        </button>
        <button class="tab-btn" data-tab="limitups">
          <i data-lucide="list-ordered"></i>상한가 리스트
        </button>
      </nav>
      <!-- Settings and Actions -->
      <div class="header-actions">
        <span id="app-mode-badge" class="mode-badge">Supabase Mode</span>
        
        <!-- Scheduler Logs Monitor Dropdown -->
        <div class="scheduler-monitor" id="scheduler-monitor-container">
          <button id="scheduler-status-btn" class="scheduler-status-btn" title="스케줄러 수집 상태">
            <span id="scheduler-status-dot" class="status-dot"></span>
            <span class="status-text">수집 상태</span>
            <i data-lucide="chevron-down" class="chevron-icon"></i>
          </button>
          
          <!-- Dropdown log panel -->
          <div class="scheduler-dropdown" id="scheduler-dropdown-menu">
            <div class="dropdown-header">
              <h4>수집 로그 (최근 5건)</h4>
              <button id="refresh-logs-btn" class="refresh-logs-btn" title="새로고침">
                <i data-lucide="refresh-cw"></i>
              </button>
            </div>
            <div class="dropdown-body" id="scheduler-logs-list">
              <div class="log-loading">로그를 불러오는 중...</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Dashboard Section -->
    <main id="tab-dashboard" class="dashboard-grid tab-content">
      
      <!-- Left Sidebar: Search & Quick Access -->
      <section class="sidebar-panel">
        
        <!-- Search Widget -->
        <div class="search-box">
          <h2 class="panel-title">주식 종목 검색</h2>
          <div class="search-controls">
            <div class="search-input-wrapper">
              <i data-lucide="search" class="search-icon"></i>
              <input type="text" id="stock-search-input" class="search-input" placeholder="종목 코드(6자리) 또는 이름 입력..." autocomplete="off">
              <!-- Autocomplete list -->
              <div id="suggestions-container" class="suggestions-list"></div>
            </div>
            <!-- Date Input -->
            <div class="date-input-wrapper">
              <i data-lucide="calendar" class="date-icon"></i>
              <input type="date" id="stock-search-date" class="date-input">
            </div>
            <!-- Search Button -->
            <button id="stock-search-submit-btn" class="btn btn-primary search-submit-btn">
              <i data-lucide="search"></i>조회하기
            </button>
          </div>
        </div>
      </section>

      <!-- Right Main Content Panel -->
      <section class="main-content">
        
        <!-- Stock Details Card -->
        <div id="stock-detail-card" class="stock-card">
          <!-- Populated dynamically by JS -->
          <div class="stock-card-loading">
            <div class="spinner"></div>
            <p style="color: var(--text-muted);">실시간 주식 시세를 가져오는 중...</p>
          </div>
        </div>

        <!-- Price Chart Section -->
        <div class="chart-box">
          <div class="chart-header">
            <h2 class="panel-title">
              <i data-lucide="activity" style="display:inline; width:16px; height:16px; margin-right:6px; vertical-align:middle;"></i>당일 시세 트렌드
            </h2>
            <span class="chart-period">09:00 - 15:30</span>
          </div>
          
          <div class="chart-canvas-wrapper">
            <!-- Tooltip -->
            <div id="chart-tooltip" class="chart-tooltip">
              <div class="tooltip-time">10:30</div>
              <div class="tooltip-price">78,500원</div>
            </div>

            <svg id="stock-chart-svg" class="chart-svg">
              <defs>
                <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="var(--color-accent)" stop-opacity="0.3"></stop>
                  <stop offset="100%" stop-color="var(--color-accent)" stop-opacity="0.0"></stop>
                </linearGradient>
              </defs>
              <!-- Grid and line groups created by JS -->
              <g id="chart-grid-group"></g>
              <path id="chart-area-path" class="chart-area-fill" d=""></path>
              <path id="chart-line-path" class="chart-line" d=""></path>
              <g id="chart-dots-group"></g>
              <line id="chart-hover-line" class="chart-hover-line" x1="0" y1="0" x2="0" y2="0" style="display:none;"></line>
            </svg>
          </div>
        </div>

      </section>
    </main>

    <!-- Limitups Tab -->
    <div id="tab-limitups" class="tab-content" style="display: none; flex-direction: column; gap: 20px; width: 100%;">
      <!-- Limitups Header Box -->
      <div class="limitups-header-box" style="display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 16px 24px; border-radius: var(--radius-md); border: 1px solid var(--border-color); backdrop-filter: blur(20px); flex-wrap: wrap; gap: 16px;">
        <div class="limitups-header-title">
          <h2 class="panel-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="history" style="color: var(--color-up); width: 22px; height: 22px;"></i>
            상한가 누적 히스토리 (날짜별)
          </h2>
        </div>
        <div style="font-size: 0.82rem; color: var(--text-muted);">
          매일 장마감 후 자동으로 아카이빙된 누적 상한가 종목 목록입니다.
        </div>
      </div>
      
      <!-- Limitups List Result Container -->
      <div id="limitups-result-container" class="stock-card" style="min-height: 200px; padding: 0;">
        <div class="stock-card-loading" style="padding: 60px 20px; text-align: center;">
          <div class="spinner"></div>
          <p style="color: var(--text-muted); margin-top: 12px;">누적 상한가 데이터를 불러오는 중...</p>
        </div>
      </div>
    </div>

  </div>



  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Main Application Script -->
  <script type="module" src="app.js"></script>
</body>
</html>
